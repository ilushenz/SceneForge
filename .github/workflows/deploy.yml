name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build client
        run: npm run build --workspace=client
        env:
          # Base path must match the GitHub repo name (case-sensitive)
          VITE_BASE_PATH: /SceneForge/
          # Your Railway backend URL — set this in repo Settings → Secrets → Actions
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
          # Keeps a single flat commit on gh-pages (no history bloat)
          force_orphan: true
